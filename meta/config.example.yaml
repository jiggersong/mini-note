# ============================================================
# notes-v2 非密钥配置
# 复制为 config.yaml 后按需修改
# ============================================================

# 默认 scope，多人共享空间
default_scope: shared

# 单写锁超时（秒）
lock_timeout_seconds: 300

# 文件上限（可覆盖 .env 中的设置）
limits:
  max_pdf_pages: 40
  max_office_mb: 10
  max_text_mb: 2
  max_image_mb: 20
  max_audio_minutes: 10
  max_video_minutes: 5

# 备份保留策略
backup_retention:
  incremental_days: 14
  daily_days: 30
  weekly_weeks: 12
  monthly_months: 12

# Lint 周期
lint:
  claim_stale_days: 90
  sample_grounding_count: 10

# 日志级别: DEBUG, INFO, WARN, ERROR
log_level: INFO
